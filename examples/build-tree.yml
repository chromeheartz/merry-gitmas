# Copy this into YOUR profile repo at .github/workflows/build-tree.yml
# (the repo named exactly like your username, e.g. chromeheartz/chromeheartz)
#
# It rebuilds the tree daily and commits the SVG so your profile README stays fresh.
# The `theme` choice input shows a dropdown on the Actions → "Run workflow" button.
name: Build Christmas Tree

on:
  schedule:
    - cron: "0 18 * * *" # daily at 18:00 UTC
  workflow_dispatch:
    inputs:
      theme:
        description: "Background theme"
        type: choice
        default: default
        options: [default, space, winter, sky]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tree
        uses: chromeheartz/merry-gitmas@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          theme: ${{ inputs.theme || 'default' }}
          width: 350
          output: profile-tree.svg

      - name: Commit the SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update christmas tree 🎄"
          file_pattern: profile-tree.svg
